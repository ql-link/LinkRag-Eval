# LinkRag-Eval 评测自持库迁移配置(独立库 tolink_rag_eval_db)。
# sqlalchemy.url 留空,运行时由 alembic/env.py 注入:
#   ALEMBIC_DATABASE_URL 环境变量 > EVAL_DB_* 构建的 mysql+pymysql DSN。
[alembic]
script_location = alembic
file_template = %%(rev)s_%%(year)d%%(month).2d%%(day).2d_%%(slug)s
prepend_sys_path = src
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
